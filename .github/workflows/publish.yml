name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: publish-to-pypi

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Make sure tags are fetched, so we can get a version.
      # Use --force to handle cases where a tag already exists locally from checkout.
      - run: |
          git fetch --prune --unshallow --tags --force

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine wheel

      - name: Build
        run: |
          python -m build
          python -m wheel tags --platform-tag manylinux1_x86_64 dist/*any.whl
          rm dist/*any.whl

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1